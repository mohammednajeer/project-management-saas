services:

  backend:
    build:
      context: ./backend/management

    env_file:
      - ./backend/management/.env

    container_name: projectflow_backend

    command: daphne -b 0.0.0.0 -p 8000 management.asgi:application

    volumes:
      - ./backend/management:/app

    ports:
      - "8000:8000"

    depends_on:
      - db


  frontend:
    build:
      context: ./frontend

    env_file:
      - ./frontend/.env

    container_name: projectflow_frontend

    volumes:
      - ./frontend:/app
      - /app/node_modules

    ports:
      - "5173:5173"

    depends_on:
      - backend


  db:
    image: postgres:16

    container_name: projectflow_db

    environment:
      POSTGRES_DB: project_management_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234567890

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7

    container_name: projectflow_redis

    ports:
      - "6379:6379"


  celery:
    build:
      context: ./backend/management

    container_name: projectflow_celery

    command: celery -A management worker -l info

    volumes:
      - ./backend/management:/app

    env_file:
      - ./backend/management/.env

    depends_on:
      - backend
      - redis


volumes:
  postgres_data: